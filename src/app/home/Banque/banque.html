<div class="header">
  <div class="left">
    <img src="assets/logo-FMC.svg" class="logo" (click)="navigate('/home')" />
  </div>
  <div class="center">
    <div class="menu">
      <div class="menu-item" *ngFor="let item of menuItems">
        <span *ngIf="!item.children" (click)="navigate(item.route)">{{ item.label }}</span>
        <div class="dropdown" *ngIf="item.children">
          <span class="dropdown-title">{{ item.label }} ▼</span>
          <div class="dropdown-menu">
            <div class="dropdown-item" *ngFor="let child of item.children" (click)="navigate(child.route)">
              {{ child.label }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="right">
    <img src="assets/logout.png" class="logout-icon" (click)="logout()" />
  </div>
</div>

<div class="page-container">

  <div class="page-header">
    <div class="page-title">
      <h1>Correspondance Banque</h1>
      <!-- <p>Associez vos banques Sage X3 aux banques de trésorerie</p> -->
    </div>
    <div class="page-actions">
      <button class="action-btn btn-secondary" (click)="annuler()">
        <span>✕</span> Annuler
      </button>
      <button class="action-btn btn-primary" (click)="valider()" [disabled]="saving">
        <span>✓</span> {{ saving ? 'Enregistrement...' : 'Valider' }}
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="col-label">Banque X3</div>
      <div class="col-label">Banque Trésorerie</div>
      <div class="col-actions"></div>
    </div>

    <div class="card-body">
      <div class="mapping-row" *ngFor="let row of rows; let i = index">
        <div class="mapping-col">
          <select [(ngModel)]="row.banqueX3" class="modern-select">
            <option value="">— Sélectionner une banque —</option>
            <option *ngFor="let b of banquesX3" [value]="b.BAN">{{ b.PAB }}</option>
          </select>
        </div>
        <div class="mapping-arrow">→</div>
        <div class="mapping-col">
          <select [(ngModel)]="row.banqueTreso" class="modern-select treso">
            <option value="">— Sélectionner une banque —</option>
            <option *ngFor="let t of banquesTreso" [value]="t.CODE">{{ t.DESCRIPTION }}</option>
          </select>
        </div>
        <div class="mapping-delete">
          <button class="btn-delete" (click)="removeRow(i)" title="Supprimer">✕</button>
        </div>
      </div>

      <div class="add-row">
        <button class="btn-add-row" (click)="addRow()">
          + Ajouter une correspondance
        </button>
      </div>
    </div>
  </div>

</div>
